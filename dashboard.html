<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AGRISENSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        
        .section-card {
            transition: all 0.3s ease;
        }
        
        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.15);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.1);
        }
        
        .submit-btn {
            transition: all 0.4s ease;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-border {
            animation: pulseBorder 2s ease-in-out infinite;
        }
        
        @keyframes pulseBorder {
            0%, 100% { border-color: #22c55e; }
            50% { border-color: #4ade80; }
        }
        
        .image-preview {
            transition: all 0.3s ease;
        }
        
        .image-preview:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <svg class="w-10 h-10 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1z"/>
                    </svg>
                    <span class="text-2xl font-bold text-green-700">AGRISENSE</span>
                </div>
                
                <div class="flex items-center space-x-6">
                    <span class="text-gray-700 font-medium">Welcome, {{ user_name }}</span>
                    <a href="{{ url_for('history') }}" class="text-green-600 hover:text-green-700 font-semibold transition">History</a>
                    <a href="{{ url_for('analytics') }}" class="text-green-600 hover:text-green-700 font-semibold transition">Analytics</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="text-center mb-10 fade-in">
            <h1 class="text-4xl font-bold text-gray-800 mb-3">Farm Health Analysis Dashboard</h1>
            <p class="text-lg text-gray-600">Enter your farm data below for comprehensive AI-powered analysis</p>
        </div>

        <form method="POST" action="{{ url_for('predict') }}" enctype="multipart/form-data" class="space-y-8">
            
            <div class="section-card bg-white rounded-2xl shadow-xl p-8 fade-in">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Crop Recommendation Parameters</h2>
                </div>
                
                <div class="grid md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nitrogen (N)</label>
                        <input type="number" name="nitrogen" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="0 - 140">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Phosphorus (P)</label>
                        <input type="number" name="phosphorus" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="5 - 145">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Potassium (K)</label>
                        <input type="number" name="potassium" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="5 - 205">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Temperature (°C)</label>
                        <input type="number" name="temperature" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="8 - 44">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Humidity (%)</label>
                        <input type="number" name="humidity" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="14 - 100">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">pH Value</label>
                        <input type="number" name="ph" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="3.5 - 9.9">
                    </div>
                    
                    <div class="md:col-span-3">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Rainfall (mm)</label>
                        <input type="number" name="rainfall" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                               placeholder="20 - 300">
                    </div>
                </div>
            </div>

            <div class="section-card bg-white rounded-2xl shadow-xl p-8 fade-in">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5.5 2a3.5 3.5 0 101.665 6.58L8.585 10l-1.42 1.42a3.5 3.5 0 101.414 1.414l8.128-8.127a1 1 0 00-1.414-1.414L10 8.586 8.58 7.165A3.5 3.5 0 005.5 2zM4 5.5a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0zm0 9a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Irrigation Advisory Parameters</h2>
                </div>
                
                <div class="grid md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Crop Type</label>
                        <select name="crop_type" required
                                class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select crop type</option>
                            <option value="1">Paddy</option>
                            <option value="2">Ground Nuts</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Crop Days</label>
                        <input type="number" name="crop_days" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="1 - 100">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Soil Moisture</label>
                        <input type="number" name="soil_moisture" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="100 - 800">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Soil Temperature (°C)</label>
                        <input type="number" name="soil_temperature" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="18 - 25">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Air Temperature (°C)</label>
                        <input type="number" name="temperature2" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="17 - 33">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Humidity (%)</label>
                        <input type="number" name="humidity2" step="0.01" required
                               class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="48 - 82">
                    </div>
                </div>
            </div>

            <div class="section-card bg-white rounded-2xl shadow-xl p-8 fade-in">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-amber-600" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM4.332 8.027a6.012 6.012 0 011.912-2.706C6.512 5.73 6.974 6 7.5 6A1.5 1.5 0 019 7.5V8a2 2 0 004 0 2 2 0 011.523-1.943A5.977 5.977 0 0116 10c0 .34-.028.675-.083 1H15a2 2 0 00-2 2v2.197A5.973 5.973 0 0110 16v-2a2 2 0 00-2-2 2 2 0 01-2-2 2 2 0 00-1.668-1.973z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Disease Detection</h2>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Upload Crop Leaf Image</label>
                    <div class="border-3 border-dashed border-gray-300 rounded-xl p-8 text-center pulse-border">
                        <input type="file" name="leaf_image" id="leafImage" accept="image/*" required
                               class="hidden">
                        <label for="leafImage" class="cursor-pointer">
                            <svg class="w-16 h-16 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                            </svg>
                            <p class="text-lg font-semibold text-gray-700 mb-2">Click to upload image</p>
                            <p class="text-sm text-gray-500">PNG, JPG or JPEG (Max 16MB)</p>
                        </label>
                    </div>
                    
                    <div id="imagePreview" class="mt-6 hidden">
                        <p class="text-sm font-semibold text-gray-700 mb-3">Preview:</p>
                        <img id="previewImg" class="image-preview w-full max-w-md mx-auto rounded-xl shadow-lg border-4 border-green-200">
                    </div>
                </div>
            </div>

            <div class="text-center fade-in">
                <button type="submit" 
                        class="submit-btn px-12 py-4 bg-gradient-to-r from-green-600 to-green-500 text-white rounded-xl font-bold text-xl shadow-2xl hover:from-green-700 hover:to-green-600 focus:outline-none focus:ring-4 focus:ring-green-300">
                    Analyze Farm Health
                </button>
            </div>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('leafImage');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('label').classList.add('text-green-600');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('label').classList.remove('text-green-600');
            });
        });
    </script>
</body>
</html>
